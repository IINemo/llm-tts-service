# @package _global_
# Best-of-N CUDA: GPT-4o via OpenAI API on CUDABench
# Generates N kernels and selects best by verification (not majority voting)

defaults:
  - /config
  - /dataset/cudabench_robust
  - /model/openai
  - /generation/default
  - /system/default
  - _self_

# Run naming
run_name: "cudabench_bon_gpt4o_n${strategy.num_paths}_${now:%H-%M-%S}"

# Main configuration
verbose: true
report_to: null  # Disable wandb for local runs

# Model configuration (OpenAI API backend)
model:
  type: "openai_api"
  model_path: "gpt-4o"  # GPT-4o - strong multimodal model
  supports_logprobs: true
  api_key: ""  # Set via environment variable OPENAI_API_KEY
  prefill_mode: false

# System configuration
system:
  device: cuda
  seed: 42

# Generation configuration
generation:
  max_new_tokens: 4096
  temperature: 0.7
  top_p: 0.9
  batch_size: 1
  max_length: 8192

# No scorer needed - best_of_n_cuda does its own verification
scorer: null

# Best-of-N CUDA strategy (verification-based selection)
strategy:
  type: best_of_n_cuda
  num_paths: 8  # Generate 8 kernel candidates
  max_new_tokens: 4096
  temperature: 0.7
  generation_batch_size: null
  n_threads: 1
  parallel_verification: true  # Subprocess-based parallel verification

# Dataset configuration
dataset:
  dataset_path: "test-time-compute/cudabench"
  dataset_split: "robust_kbench"
  subset: null  # Run on all samples
  offset: 0
  question_field: "pytorch_code"
  answer_field: null
  answer_format: "code"
  prompt_file: "${hydra:runtime.cwd}/config/prompts/cudabench.txt"

# Evaluation configuration - CUDA verifier settings (used by strategy)
# Note: evaluators disabled since best_of_n_cuda strategy already does verification
evaluation:
  evaluators: []  # Skip Phase 2 - strategy already verified kernels
  cuda_verifier:
    rtol: 1e-5
    atol: 1e-5
    num_trials: 1
    warmup_iters: 5
    benchmark_iters: 10
    timeout: 30.0
    use_small_inputs: true  # Use small tensors for fast testing
