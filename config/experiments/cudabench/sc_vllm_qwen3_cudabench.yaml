# @package _global_
# Self-Consistency: Qwen3-8B via vLLM on CUDABench
# CUDA kernel generation with test-time scaling

defaults:
  - /config
  - /dataset/cudabench_robust
  - /model/vllm_qwen3
  - /generation/default
  - /system/default
  - _self_

# Run naming
run_name: "cudabench_sc_vllm_n${strategy.num_paths}_${now:%H-%M-%S}"

# Main configuration
verbose: true
report_to: null  # Disable wandb for local runs

# Model configuration (vLLM backend)
model:
  type: "vllm"
  model_path: "Qwen/Qwen3-8B"
  gpu_memory_utilization: 0.9
  tensor_parallel_size: 1
  enable_prefix_caching: true
  trust_remote_code: true
  max_model_len: 8192
  disable_thinking_mode: true  # Disable Qwen3 thinking mode

# System configuration
system:
  device: cuda
  seed: 42

# Generation configuration (non-thinking mode)
generation:
  max_new_tokens: 4096  # CUDA kernels don't need as many tokens
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  batch_size: 1
  max_length: 8192

# No scorer needed for self-consistency (uses majority voting)
# For best-of-n with speedup scoring, use scorer: cuda_speedup
scorer: null

# Self-consistency strategy
strategy:
  type: self_consistency
  num_paths: 8  # Generate 8 kernel candidates
  max_new_tokens: 4096
  temperature: 0.7
  generation_batch_size: null
  n_threads: 1

# Dataset configuration
dataset:
  dataset_path: "test-time-compute/cudabench"  # HuggingFace dataset
  dataset_split: "robust_kbench"
  subset: 5  # Start with 5 tasks for testing
  offset: 0
  question_field: "pytorch_code"
  answer_field: null  # No ground truth - evaluated by execution
  answer_format: "code"
  prompt_file: "${hydra:runtime.cwd}/config/prompts/cudabench.txt"

# Evaluation configuration - use CUDA verifier
evaluation:
  evaluators:
    - cuda_verifier
  cuda_verifier:
    rtol: 1e-5
    atol: 1e-5
    num_trials: 1  # Reduced for faster testing
    warmup_iters: 5
    benchmark_iters: 10
    timeout: 30.0  # 30 second timeout
    use_small_inputs: true  # Use small tensors (2x8x16x16) for fast testing
